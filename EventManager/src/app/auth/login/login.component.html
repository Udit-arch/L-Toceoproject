<div class="auth-container">
    <div class="auth-card">
        <div class="brand-header">
            <div class="logo-circle">EH</div>
            <h2>EVENT HORIZON</h2>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" type="email" formControlName="email" placeholder="admin@eventhorizon.com"
                    [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" formControlName="password" placeholder="Enter password (any)"
                    [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            </div>

            <div *ngIf="error" class="error-message">{{ error }}</div>

            <button type="submit" class="submit-btn" [disabled]="loginForm.invalid || loading">
                {{ loading ? 'Signing in...' : 'Sign In' }}
            </button>

            <div class="auth-footer">
                Don't have an account? <a routerLink="/auth/register" class="text-cyan">Register</a>
            </div>

            <div class="demo-hints">
                <small><strong>Demo Logins:</strong></small>
                <small>Admin: admin&#64;eventhorizon.com</small>
                <small>Customer: user&#64;example.com</small>
            </div>
        </form>
    </div>
</div>
